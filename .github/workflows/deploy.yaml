name: Deploy to PyPI

on:
  push:
    branches:
      - 'deploy'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Pull Release and Deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download wheels from latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir dist
          cd dist
          # This grabs all wheels and source distributions from the absolute latest release
          gh release download --pattern "*.whl"
          gh release download --pattern "*.tar.gz"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip and install twine
        run: |
          python -m pip install --upgrade pip
          pip install twine

      - name: Publish wheels to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          twine upload dist/*